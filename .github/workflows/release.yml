name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          $tagVersion = $env:GITHUB_REF_NAME.TrimStart('v')
          if ($packageVersion -ne $tagVersion) {
            throw "Tag version $tagVersion does not match package.json version $packageVersion."
          }

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish release
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
